<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — UnknownBooks</title>
    <link rel="icon" type="image/png" href="{{ url_for('assets', filename='LogoUnknown.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variabel.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body class="page-register">

    <!-- Left Panel: Form Register (di kiri karena sudah slide) -->
    <div class="panel-form" id="panelForm">
        <div class="form-wrapper">

            <div class="form-header">
                <h1>Buat Akun</h1>
                <p>Bergabung dan mulai perjalanan membacamu</p>
            </div>

            <form id="registerForm" novalidate>

                <div class="input-group" id="group-name">
                    <label for="name">Nama Lengkap</label>
                    <div class="input-box">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="name" name="name" placeholder="Nama kamu" autocomplete="name" required>
                    </div>
                    <span class="input-error" id="name-error"></span>
                </div>

                <div class="input-group" id="group-email">
                    <label for="email">Email</label>
                    <div class="input-box">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <polyline points="2,4 12,13 22,4"/>
                        </svg>
                        <input type="email" id="email" name="email" placeholder="nama@email.com" autocomplete="email" required>
                    </div>
                    <span class="input-error" id="email-error"></span>
                </div>

                <div class="input-group" id="group-password">
                    <label for="password">Kata Sandi</label>
                    <div class="input-box">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Min. 6 karakter" autocomplete="new-password" required>
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Tampilkan kata sandi">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="input-error" id="password-error"></span>
                </div>

                <div class="input-group" id="group-confirm">
                    <label for="confirm">Konfirmasi Kata Sandi</label>
                    <div class="input-box">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <input type="password" id="confirm" name="confirm" placeholder="Ulangi kata sandi" autocomplete="new-password" required>
                        <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Tampilkan konfirmasi">
                            <svg id="eyeIconConfirm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="input-error" id="confirm-error"></span>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <span class="btn-text">Daftar</span>
                    <span class="btn-loader" id="btnLoader" hidden>
                        <svg class="spinner" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="40 60"/>
                        </svg>
                    </span>
                </button>

                <div class="alert" id="formAlert" hidden></div>

            </form>

            <div class="form-footer">
                <p>Sudah punya akun? <a href="/login" class="link-masuk" id="linkMasuk">Masuk</a></p>
            </div>

        </div>
    </div>

    <!-- Right Panel: Branding -->
    <div class="panel-brand" id="panelBrand">
        <div class="brand-banner">
            <img src="{{ url_for('assets', filename='LogoUnknown.svg') }}" alt="Logo" class="flag-logo">
        </div>

        <div class="panel-content">
            <h2 class="panel-tagline">Ribuan buku.<br>Satu tempat.</h2>
            <p class="panel-sub">Daftarkan akunmu dan nikmati koleksi buku pengetahuan, ilmu, dan ide dari seluruh dunia.</p>

            <div class="book-stack">
                <div class="book b1"></div>
                <div class="book b2"></div>
                <div class="book b3"></div>
                <div class="book b4"></div>
                <div class="book b5"></div>
            </div>
        </div>

        <p class="panel-footer">© 2025 UnknownBooks</p>
    </div>

    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>

</html>
