<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Buku - Unknown Books</title>
  <link rel="icon" type="image/png" href="/assets/LogoUnknown.svg" />
  <link rel="stylesheet" href="/static/css/variabel.css" />
  <link rel="stylesheet" href="/static/css/detail.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Topbar -->
  <header class="detail-topbar">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Kembali
    </button>
    <div class="detail-topbar__logo">
      <img src="/assets/unknown.svg" alt="Unknown Books" />
    </div>
  </header>

  <!-- Main Content -->
  <main class="detail-main">

    <!-- Cover -->
    <div class="detail-cover-wrap">
      <img src="" alt="Cover Buku" class="detail-cover" id="detailCover" />
      <span class="detail-badge" id="detailBadge"></span>
    </div>

    <!-- Info -->
    <div class="detail-info">

      <h1 class="detail-title" id="detailTitle">Judul Buku</h1>

      <div class="detail-author" id="detailAuthor">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span id="detailAuthorName">Nama Penulis</span>
      </div>

      <div class="detail-rating">
        <span class="detail-stars" id="detailStars">★★★★★</span>
        <span class="detail-rating-text" id="detailRatingText">5/5</span>
      </div>

      <div class="detail-lang" id="detailLangWrap" style="display:none;">
        <span id="detailLang"></span>
      </div>

      <p class="detail-desc" id="detailDesc">
        Deskripsi buku akan muncul di sini. Tambahkan informasi singkat tentang isi buku, tema, dan apa yang akan pembaca dapatkan setelah membacanya.
      </p>

      <div class="detail-actions">
        <button class="btn-read" id="btnRead">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Mulai Membaca
        </button>
        <button class="btn-save" id="btnSave">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          Simpan
        </button>
      </div>

    </div>
  </main>

  <script src="/static/js/detail.js"></script>
</body>
</html>
