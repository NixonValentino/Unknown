<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ book.title }} — Unknown Books</title>
  <link rel="icon" type="image/png" href="/assets/LogoUnknown.svg" />
  <link rel="stylesheet" href="/static/css/variabel.css" />
  <link rel="stylesheet" href="/static/css/detail.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Topbar -->
  <header class="detail-topbar">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Kembali
    </button>
    <div class="detail-topbar__logo">
      <img src="/assets/unknown.svg" alt="Unknown Books" />
    </div>
  </header>

  <!-- Main Content -->
  <main class="detail-main">

    <!-- Cover -->
    <div class="detail-cover-wrap">
      <img src="{{ book.cover }}" alt="{{ book.title }}" class="detail-cover" />

      {% if book.badge == 'free' %}
        <span class="detail-badge badge-free">GRATIS</span>
      {% elif book.badge == 'premium' %}
        <span class="detail-badge badge-premium">👑 PREMIUM</span>
      {% endif %}
    </div>

    <!-- Info -->
    <div class="detail-info">

      <h1 class="detail-title">{{ book.title }}</h1>

      <div class="detail-author">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>{{ book.author }}</span>
      </div>

      <div class="detail-rating">
        <span class="detail-stars">{{ book.stars }}</span>
        <span class="detail-rating-text">{{ book.rating }}</span>
      </div>

      {% if book.lang %}
      <div class="detail-lang">
        Tersedia: {{ book.lang }}
      </div>
      {% endif %}

      <p class="detail-desc">{{ book.desc }}</p>

      <div class="detail-actions">
        <a href="/read?book={{ book.title | urlencode }}" class="btn-read">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Mulai Membaca
        </a>

        <button class="btn-save" id="btnSave">
          <svg id="saveIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          <span id="saveLabel">Simpan</span>
        </button>
      </div>

    </div>
  </main>

  <script>
    // Terapkan tema tersimpan
    var theme = localStorage.getItem('mb-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);

    // Tombol simpan — toggle visual
    document.getElementById('btnSave').addEventListener('click', function () {
      var btn   = this;
      var icon  = document.getElementById('saveIcon');
      var label = document.getElementById('saveLabel');
      var saved = btn.dataset.saved === 'true';

      if (!saved) {
        btn.dataset.saved    = 'true';
        icon.setAttribute('fill', 'currentColor');
        label.textContent    = 'Tersimpan';
        btn.style.color       = '#e03a2f';
        btn.style.borderColor = '#e03a2f';
      } else {
        btn.dataset.saved    = 'false';
        icon.setAttribute('fill', 'none');
        label.textContent    = 'Simpan';
        btn.style.color       = '';
        btn.style.borderColor = '';
      }
    });
  </script>

</body>
</html>
